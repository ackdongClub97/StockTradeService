spring:
  application:
    name: stockTrade

  datasource:
    url: jdbc:h2:tcp://localhost/~/stockTrade
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        #show_sql: true
        format_sql: true

hantu-openapi:
  appkey: #appkey
  appsecret: #appsecret
  appUrl: https://openapivts.koreainvestment.com:29443
  # https://openapi.koreainvestment.com:9443 실전 도메인
logging:
  level:
    org.hibernate.SQL: debug
