spring:
  application:
    name: stockTrade

  devtools:
    restart:
      enabled: true
  web:
    resources:
      cache:
        period: 0
        cachecontrol:
          no-cache: true
      static-locations: file:src/main/resources/static/
  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/

  task:
    scheduling:
      enabled: true

  freemarker:
    cache: false

  datasource:
    url: jdbc:h2:tcp://localhost/~/stockTrade
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        #show_sql: true
        format_sql: true

hantu-openapi:
  appkey: #{appkey}
  appsecret: #{appsecret}
  appUrl: https://openapivts.koreainvestment.com:29443
  # https://openapi.koreainvestment.com:9443 실전 도메인
logging:
  level:
    org.hibernate.SQL: debug

kis:
  rank:
    refresh-interval-ms: 30000 # 30초마다 갱신

